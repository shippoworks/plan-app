name = "yatta-app"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# D1 binding — Cloudflare ダッシュボードまたは `wrangler d1 create yatta-db` 後に
# database_id を埋めて remote にデプロイ可能。ローカル開発は --local で動く。
[[d1_databases]]
binding = "DB"
database_name = "yatta-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"
